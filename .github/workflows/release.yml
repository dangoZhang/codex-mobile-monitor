name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  simulator-build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bridge dependency
        run: pip install -r requirements.txt

      - name: Validate bridge
        run: python -m py_compile bridge/bridge_server.py

      - name: Build iOS simulator app
        run: |
          xcodebuild \
            -project CodeXMobile.xcodeproj \
            -scheme CodeXMobile \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath dist/DerivedData \
            build

      - name: Archive simulator app
        run: |
          cd dist/DerivedData/Build/Products/Debug-iphonesimulator
          zip -qry ../../../../CodeXMobile-simulator.zip CodeXMobile.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeXMobile-simulator
          path: dist/CodeXMobile-simulator.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CodeXMobile-simulator.zip
